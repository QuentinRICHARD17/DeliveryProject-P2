<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>G-ACT — Coffre</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="app-page">

    <!-- ── HEADER ───────────── -->
    <header class="app-header">
      <div class="header-capsule">
        <img src="../img/autres/Gpoints.png" alt="Image de G-Points)">
        <span>G-Points: 1&nbsp;250</span>
      </div>
      <div class="header-capsule">
        <img src="../img/autres/Flammes.png" alt="Image de Flammes">
        <span>Flammes: 15 jrs</span>
      </div>
    </header>

    <!-- ── MAIN CONTENT ───────────────────── -->
    <main class="page-scroll">

      <p class="page-eyebrow">Récompenses</p>
      <p class="page-title">Mes Coffres</p>

      <div class="coffre-list">

        <!-- Coffre Commun -->
        <article class="coffre-card coffre-card--common" aria-label="Coffre de Bienveillance Simple">
          <div class="coffre-info">
            <p class="coffre-rarity">Commun</p>
            <p class="coffre-title">Coffre <br>Commun</p>
            <button class="coffre-open-btn">Ouvrir</button>
          </div>
          <div class="coffre-img-wrap">
            <img src="../img/autres/CoffreCommun.png" alt="image.png Coffre commun">
          </div>
        </article>

        <!-- Coffre Rare -->
        <article class="coffre-card coffre-card--rare" aria-label="Coffre de l'Impact Rare">
          <div class="coffre-info">
            <p class="coffre-rarity">Rare</p>
            <p class="coffre-title">Coffre <br>Rare</p>
            <button class="coffre-open-btn">Ouvrir</button>
          </div>
          <div class="coffre-img-wrap">
            <img src="../img/autres/CoffreRare.png" alt="Coffre rare">
          </div>
        </article>

        <!-- Coffre Épique -->
        <article class="coffre-card coffre-card--epic" aria-label="Coffre Épique">
          <div class="coffre-info">
            <p class="coffre-rarity">Épique</p>
            <p class="coffre-title">Coffre<br>Épique</p>
            <button class="coffre-open-btn">Ouvrir</button>
          </div>
          <div class="coffre-img-wrap">
            <img src="../img/autres/CoffreEpic.png" alt="Coffre épique">
          </div>
        </article>

        <!-- Coffre Légendaire -->
        <article class="coffre-card coffre-card--legend" aria-label="Coffre Légendaire">
          <div class="coffre-info">
            <p class="coffre-rarity">Légendaire</p>
            <p class="coffre-title">Coffre<br>Légendaire</p>
            <button class="coffre-open-btn">Ouvrir</button>
          </div>
          <div class="coffre-img-wrap">
            <img src="../img/autres/CoffreLégendaire.png" alt="Coffre légendaire">
          </div>
        </article>

      </div>

    </main>

    <!-- ── BOTTOM NAV ──────────────────────── -->
    <nav class="bottom-nav" aria-label="Navigation principale">

      <button class="nav-item" data-page="coffre.html" aria-label="Coffre">
        <img src="../img/icones/iconeCoffre.png" alt="Icône Coffre navigation">
        <span>Coffre</span>
      </button>

      <button class="nav-item active" data-page="maison.html" aria-label="Fil d'actualité">
        <img src="../img/icones/iconeMaison.png" alt="Icône Maison navigation">
        <span>Maison</span>
      </button>

      <button class="nav-item nav-camera" data-page="camera.html" aria-label="Publier une action">
        <img src="../img/icones/iconeAppareilPhoto.png" alt="Icône Appareil photo navigation">
        <span>Publier</span>
      </button>

      <button class="nav-item" data-page="compte.html" aria-label="Mon compte">
        <img src="../img/autres/photoDeProfilDeBase.png" alt="Icône Compte utilisateur navigation">
        <span>Compte</span>
      </button>

    </nav>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
