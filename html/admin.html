<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-ACT - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-page { padding: 20px; max-width: 900px; margin: 0 auto; background: #f9f9f9; min-height: 100vh; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .admin-section h2 { margin-bottom: 20px; color: var(--text-dark); border-bottom: 2px solid var(--green-light); padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 0.9em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; font-weight: 800; }
        
        .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-small { padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; cursor: pointer; color: white; border:none; }
        .btn-blue { background: #4facde; }
        .btn-green { background: #56ab2f; }
        .btn-red { background: #ff6b6b; }
        .btn-orange { background: #ff9f43; }
        .btn-purple { background: #a29bfe; }
        
        .admin-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .stat-input { width: 60px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--green-mid); font-weight: bold; text-decoration: none; }

        /* MODAL BADGES */
        .modal-admin { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .badge-manager-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin: 20px 0; }
        .badge-slot { text-align: center; cursor: pointer; padding: 10px; border-radius: 10px; border: 2px solid transparent; transition: all 0.2s; }
        .badge-slot img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; filter: grayscale(1) opacity(0.3); }
        .badge-slot span { font-size: 10px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge-slot.owned { background: #e8f5e9; border-color: #56ab2f; }
        .badge-slot.owned img { filter: none; opacity: 1; }
        .rarity-tag { font-size: 8px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="admin-page">
        <a href="maison.html" class="back-link">← Retour au site</a>
        <div class="admin-header">
            <h1>🛠 Dashboard Admin</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn-small btn-orange" onclick="resetAllVotes()">⚠️ Reset Votes</button>
                <button class="btn-small btn-blue" onclick="loadAdminData()">Rafraîchir 🔄</button>
            </div>
        </div>

        <div class="admin-section">
            <h2>👥 Gestion des Comptes</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Pseudo</th><th>Points</th><th>Streak</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-users-list"></tbody>
            </table>
        </div>

        <div class="admin-section">
            <h2>📸 Toutes les Actions</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Photo</th><th>Auteur</th><th>Votes (+/-)</th><th>Statut</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-actions-list"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL GESTION BADGES -->
    <div id="badge-modal" class="modal-admin">
        <div class="modal-content">
            <h2 id="badge-modal-title">Gérer les Badges</h2>
            <p style="font-size: 0.8em; color: #666;">Cliquez sur un badge pour l'ajouter/enlever (Vert = Possédé)</p>
            <div class="badge-manager-grid" id="all-badges-grid"></div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-small btn-red" onclick="closeBadgeModal()">Annuler</button>
                <button class="btn-small btn-green" id="save-badges-btn">Sauvegarder</button>
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        let currentEditingUserId = null;
        let selectedBadgeFiles = [];

        async function loadAdminData() {
            const token = localStorage.getItem('gact_token');
            if (!token) return;
            await loadBadgesRegistry(); // S'assurer que le registre est là
            try {
                const resUsers = await fetch(`${API_URL}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
                const users = await resUsers.json();
                renderUsers(users);
                const resActions = await fetch(`${API_URL}/admin/actions`, { headers: { 'Authorization': `Bearer ${token}` } });
                const actions = await resActions.json();
                renderActions(actions);
            } catch (e) { console.error(e); }
        }

        function renderUsers(users) {
            const container = document.getElementById('admin-users-list');
            container.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td><strong>${u.pseudo}</strong></td>
                    <td><input type="number" class="stat-input" value="${u.score_global}" id="score-${u.id}"></td>
                    <td><input type="number" class="stat-input" value="${u.streak}" id="streak-${u.id}"></td>
                    <td class="action-btns">
                        <button class="btn-small btn-green" onclick="updateUser(${u.id})">💾</button>
                        <button class="btn-small btn-purple" onclick="openBadgeModal(${u.id}, '${u.pseudo}', ${JSON.stringify(u.badges).replace(/"/g, '&quot;')})">🏅 Pins</button>
                        <button class="btn-small btn-blue" onclick="loginAs('${u.pseudo}')">👤 Login</button>
                        <button class="btn-small btn-red" onclick="deleteUser(${u.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function openBadgeModal(userId, pseudo, userBadges) {
            currentEditingUserId = userId;
            document.getElementById('badge-modal-title').textContent = `Gérer les Pins de ${pseudo}`;
            selectedBadgeFiles = userBadges.map(b => b.badge_name);
            renderBadgeGrid();
            document.getElementById('badge-modal').style.display = 'flex';
        }

        function renderBadgeGrid() {
            const grid = document.getElementById('all-badges-grid');
            grid.innerHTML = Object.values(allBadgesData).map(b => {
                const isOwned = selectedBadgeFiles.includes(b.file);
                return `
                    <div class="badge-slot ${isOwned ? 'owned' : ''}" onclick="toggleBadgeOwnership('${b.file}')">
                        <img src="../img/pinsCoffreAleatoire/${b.file}" alt="${b.name}">
                        <span class="rarity-tag" style="color:var(--${b.rarity})">${b.rarity}</span>
                        <span>${b.name}</span>
                    </div>
                `;
            }).join('');
        }

        function toggleBadgeOwnership(filename) {
            if (selectedBadgeFiles.includes(filename)) {
                selectedBadgeFiles = selectedBadgeFiles.filter(f => f !== filename);
            } else {
                selectedBadgeFiles.push(filename);
            }
            renderBadgeGrid();
        }

        document.getElementById('save-badges-btn').onclick = async () => {
            const token = localStorage.getItem('gact_token');
            await fetch(`${API_URL}/admin/users/${currentEditingUserId}/badges`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(selectedBadgeFiles)
            });
            showToast("Badges mis à jour");
            closeBadgeModal();
            loadAdminData();
        };

        function closeBadgeModal() { document.getElementById('badge-modal').style.display = 'none'; }
        function renderActions(actions) {
            const container = document.getElementById('admin-actions-list');
            container.innerHTML = actions.map(a => `
                <tr>
                    <td>${a.id}</td>
                    <td><img src="${a.photo_url}" class="admin-img-preview"></td>
                    <td><strong>${a.author_pseudo || 'User #'+a.author_id}</strong></td>
                    <td><input type="number" class="stat-input" value="${a.upvotes}" id="up-${a.id}"> / <input type="number" class="stat-input" value="${a.downvotes}" id="down-${a.id}"></td>
                    <td><strong>${a.status}</strong></td>
                    <td class="action-btns">
                        <button class="btn-small btn-green" onclick="updateAction(${a.id})">💾</button>
                        <button class="btn-small btn-red" onclick="deleteActionAdmin(${a.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
        async function updateUser(id) {
            const score = document.getElementById(`score-${id}`).value;
            const streak = document.getElementById(`streak-${id}`).value;
            await adminFetch(`/admin/users/${id}`, 'PUT', { score_global: score, streak: streak });
        }
        async function updateAction(id) {
            const up = document.getElementById(`up-${id}`).value;
            const down = document.getElementById(`down-${id}`).value;
            await adminFetch(`/admin/actions/${id}`, 'PUT', { upvotes: up, downvotes: down });
        }
        async function deleteActionAdmin(id) { if (confirm("Supprimer l'action ?")) await adminFetch(`/actions/${id}`, 'DELETE'); }
        async function deleteUser(id) { if (confirm("Supprimer cet utilisateur ?")) await adminFetch(`/admin/users/${id}`, 'DELETE'); }
        async function resetAllVotes() { if (confirm("Reset tous les votes ?")) await adminFetch(`/admin/actions/reset-votes`, 'POST'); }
        async function loginAs(pseudo) {
            const res = await adminFetch(`/admin/login-as/${pseudo}`, 'POST');
            if (res.access_token) { localStorage.setItem('gact_token', res.access_token); window.location.href = 'maison.html'; }
        }
        async function adminFetch(path, method, body = null) {
            const token = localStorage.getItem('gact_token');
            const options = { method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(`${API_URL}${path}`, options);
            if (res.ok) { showToast("Réussi"); loadAdminData(); return res.status !== 204 ? await res.json() : {}; }
            return {};
        }
        document.addEventListener('DOMContentLoaded', loadAdminData);
    </script>
</body>
</html>
