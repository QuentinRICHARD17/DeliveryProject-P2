<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>G-ACT — Fil d'Actualité</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="app-page">

    <!-- ── HEADER ─────────────────────────── -->
    <header class="app-header">
      <div class="header-capsule">
        <img src="../img/autres/Gpoints.png" alt="G-Points">
        <span>G-Points: <span id="home-points">0</span></span>
      </div>
      <div class="header-capsule">
        <img src="../img/autres/Flammes.png" alt="Streak">
        <span>Streak: <span id="home-streak">0</span> jrs</span>
      </div>
    </header>

    <!-- ── MAIN FEED ──────────────────────── -->
    <main class="page-scroll" id="feed-container">
      <!-- Le feed sera chargé dynamiquement par script.js -->
      <div id="loading-spinner" style="text-align: center; padding: 40px; color: var(--text-light); font-weight: 700;">
        Chargement du feed...
      </div>
    </main>

    <!-- ── BOTTOM NAV ──────────────────────── -->
    <nav class="bottom-nav" aria-label="Navigation principale">

      <button class="nav-item active" data-page="maison.html" aria-label="Fil d'actualité">
        <img src="../img/icones/iconeMaison.png" alt="Icône Maison navigation">
        <span>Maison</span>
      </button>

      <button class="nav-item nav-camera" data-page="camera.html" aria-label="Publier une action">
        <img src="../img/icones/iconeAppareilPhoto.png" alt="Icône Appareil photo navigation">
        <span>Publier</span>
      </button>

      <button class="nav-item" data-page="coffre.html" aria-label="Coffre">
        <img src="../img/icones/iconeCoffre.png" alt="Icône Coffre navigation">
        <span>Coffre</span>
      </button>

      <button class="nav-item" data-page="compte.html" aria-label="Mon compte">
        <img src="../img/autres/photoDeProfilDeBase.png" alt="Icône Compte utilisateur navigation">
        <span>Compte</span>
      </button>

    </nav>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
