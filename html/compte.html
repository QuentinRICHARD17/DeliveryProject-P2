<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>G-ACT — Mon Profil</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="app-page">


    <!-- ── MAIN CONTENT ───────────────────── -->
    <main class="page-scroll" style="padding-top: 18px;">

      <!-- Account top row -->
      <div class="compte-header">
        <span class="compte-email" id="user-email">chargement...</span>
        <button class="compte-settings-btn" id="logout-btn" aria-label="Déconnexion" title="Déconnexion">
            <span style="font-size: 0.8em;">Déconnexion</span>
        </button>
      </div>

      <!-- Profile hero -->
      <div class="profile-hero">
        <img class="profile-avatar" src="../img/autres/photoDeProfilDeBase.png" alt="Photo de profil">
        <div>
          <p class="profile-name" id="user-pseudo">Utilisateur</p>
          <p class="profile-age" id="user-stats">Score: 0 | Streak: 0</p>
        </div>
      </div>

      <!-- Réputation -->
      <div class="compte-section" id="section-reputation">
        <p class="compte-section-title">Réputation</p>
        <div class="reputation-row">
          <span class="rep-label">Taux de confiance</span>
          <span class="rep-pct">100%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- Pins / Badges -->
      <div class="compte-section" id="section-pins">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <p class="compte-section-title" style="margin-bottom: 0;">Pins</p>
            <button class="expand-btn" id="expand-pins-btn" onclick="togglePinsExpand()" style="background: none; font-weight: 800; color: var(--green-mid); font-size: 12px; text-transform: uppercase;">Voir tout +</button>
        </div>
        <div class="pins-grid" id="pins-grid">
           <!-- Rempli dynamiquement par script.js -->
        </div>
      </div>

      <!-- Historique des Actions -->
      <div class="compte-section" id="section-history">
        <p class="compte-section-title">Mon Historique</p>
        <div class="history-grid" id="user-history">
          <p style="font-size: 0.9em; color: #666; padding: 10px;">Aucune action publiée pour le moment.</p>
        </div>
      </div>

    </main>

    <!-- ── BOTTOM NAV ──────────────────────── -->
    <nav class="bottom-nav" aria-label="Navigation principale">

      <button class="nav-item" data-page="maison.html" aria-label="Fil d'actualité">
        <img src="../img/icones/iconeMaison.png" alt="Icône Maison navigation">
        <span>Maison</span>
      </button>

      <button class="nav-item nav-camera" data-page="camera.html" aria-label="Publier une action">
        <img src="../img/icones/iconeAppareilPhoto.png" alt="Icône Appareil photo navigation">
        <span>Publier</span>
      </button>

      <button class="nav-item" data-page="coffre.html" aria-label="Coffre">
        <img src="../img/icones/iconeCoffre.png" alt="Icône Coffre navigation">
        <span>Coffre</span>
      </button>

      <button class="nav-item active" data-page="compte.html" aria-label="Mon compte">
        <img src="../img/autres/photoDeProfilDeBase.png" alt="Icône Compte utilisateur navigation">
        <span>Compte</span>
      </button>

    </nav>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
