<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>G-ACT — Mon Profil</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="app-page">


    <!-- ── MAIN CONTENT ───────────────────── -->
    <main class="page-scroll" style="padding-top: 18px;">

      <!-- Account top row -->
      <div class="compte-header">
        <span class="compte-email" id="user-email">chargement...</span>
        <button class="compte-settings-btn" id="logout-btn" aria-label="Déconnexion" title="Déconnexion">
            <span style="font-size: 0.8em;">Déconnexion</span>
        </button>
      </div>

      <!-- Profile hero -->
      <div class="profile-hero">
        <img class="profile-avatar" src="../img/autres/photoDeProfilDeBase.png" alt="Photo de profil">
        <div>
          <p class="profile-name" id="user-pseudo">Utilisateur</p>
          <p class="profile-age" id="user-stats">Score: 0 | Streak: 0</p>
        </div>
      </div>

      <!-- Reputation / Stats -->
      <div class="compte-section">
        <p class="compte-section-title">Réputation Globale</p>
        <div class="rep-row">
          <span class="rep-label">Score de confiance</span>
          <span class="rep-pct">70%</span>
        </div>
        <div class="progress-bar-track" role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100" aria-label="Réputation à 70%">
          <div class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- Pins / Badges -->
      <div class="compte-section">
        <p class="compte-section-title">Pins</p>

        <div class="pins-grid">

          <!-- Badge 1: Gardien du Littoral -->
          <div class="pin-item">
            <div class="pin-circle">
              <img src="image.png" alt="image.png (Pin Gardien du Littoral — badge plage avec vague)">
            </div>
            <span class="pin-label">Gardien du Littoral</span>
          </div>

          <!-- Badge 2: Aide à domicile -->
          <div class="pin-item">
            <div class="pin-circle">
              <img src="image.png" alt="image.png (Pin Aide à domicile — badge maison avec cœur)">
            </div>
            <span class="pin-label">Aide à domicile</span>
          </div>

          <!-- Badge 3: Eco-Curieux -->
          <div class="pin-item">
            <div class="pin-circle">
              <img src="image.png" alt="image.png (Pin Eco-Curieux — badge feuille avec loupe)">
            </div>
            <span class="pin-label">Eco-Curieux</span>
          </div>

          <!-- Badge 4: Slot vide -->
          <div class="pin-item">
            <div class="pin-circle pin-circle--empty">
              <img src="image.png" alt="image.png (Emplacement vide de badge — signe plus gris)">
            </div>
            <span class="pin-label" style="color: var(--text-light);">Vide</span>
          </div>

          <!-- Badge 5: Slot vide -->
          <div class="pin-item">
            <div class="pin-circle pin-circle--empty">
              <img src="image.png" alt="image.png (Emplacement vide de badge — signe plus gris)">
            </div>
            <span class="pin-label" style="color: var(--text-light);">Vide</span>
          </div>

        </div>
      </div>

    </main>

    <!-- ── BOTTOM NAV ──────────────────────── -->
    <nav class="bottom-nav" aria-label="Navigation principale">

      <button class="nav-item" data-page="coffre.html" aria-label="Coffre">
        <img src="../img/icones/iconeCoffre.png" alt="Icône Coffre navigation">
        <span>Coffre</span>
      </button>

      <button class="nav-item active" data-page="maison.html" aria-label="Fil d'actualité">
        <img src="../img/icones/iconeMaison.png" alt="Icône Maison navigation">
        <span>Maison</span>
      </button>

      <button class="nav-item nav-camera" data-page="camera.html" aria-label="Publier une action">
        <img src="../img/icones/iconeAppareilPhoto.png" alt="Icône Appareil photo navigation">
        <span>Publier</span>
      </button>

      <button class="nav-item" data-page="compte.html" aria-label="Mon compte">
        <img src="../img/autres/photoDeProfilDeBase.png" alt="Icône Compte utilisateur navigation">
        <span>Compte</span>
      </button>

    </nav>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
